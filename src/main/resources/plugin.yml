name: Psycho
version: '${version}'
main: com.psycho.Psycho
api-version: '1.16'
prefix: Psycho
authors: [ Rukzell ]
description: Anticheat
depend:
  - packetevents
folia-supported: true
commands:
  psycho:
    description: TornadoAnticheat main command
    usage: /psycho
    permission: psycho.use
permissions:
  psycho.admin:
    default: op
  psycho.alerts:
    default: op
  psycho.command.train:
    default: op
  psycho.command.collect:
    default: op
  psycho.command.reload:
    default: op
  psycho.command.model:
    default: op
  psycho.command.alerts:
    default: op
  psycho.command.help:
    default: op
  psycho.command.stats:
    default: op
  psycho.command.suspects:
    default: op
